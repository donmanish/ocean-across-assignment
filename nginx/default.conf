server {
    listen 80;
    server_name localhost;

    # --- 1. ROUTE /static/ FOR DJANGO ADMIN ASSETS ---
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 2. UNIVERSAL /api/ PORTAL FOR DJANGO ---
    # By removing the trailing slash from the proxy target,
    # Nginx passes /api/admin/ and /api/v1/ directly to Django exactly as typed!
    location /api/ {
        proxy_pass http://backend:8000; # --- REMOVED THE TRAILING /api/ STRIPPER ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 3. FRONTEND VITE REACT ROUTING ---
    location / {
        proxy_pass http://frontend:5173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSockets for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
